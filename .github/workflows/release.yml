name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC: npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test:unit

      - name: Verify tag matches package version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          test "$PKG" = "$TAG" || { echo "tag $TAG != package version $PKG"; exit 1; }

      # Ensure npm is recent enough for OIDC trusted publishing
      - run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN — OIDC trusted publishing handles auth.
      # Configure the trusted publisher once on npmjs.com (repo + this workflow filename).
      - run: npm publish --provenance
